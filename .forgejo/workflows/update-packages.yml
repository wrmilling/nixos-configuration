name: Update Custom Packages
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  discover:
    runs-on: alpine-tokyo
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: List updatable packages
        id: list
        run: |
          set -euo pipefail
          # custom/pkgs/update.sh --list is the single source of truth for
          # this listing (it already knows how to descend into namespaced
          # packages like obsidianPlugins/<name> and skip delegation
          # wrappers) -- don't reimplement it here, it'll drift.
          json=$(custom/pkgs/update.sh --list | jq -R -s -c 'split("\n")[:-1]')
          echo "packages=$json" >> "$GITHUB_OUTPUT"

  update:
    needs: discover
    if: needs.discover.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    runs-on: alpine-tokyo
    concurrency:
      group: pkg-update-${{ matrix.package }}
      cancel-in-progress: false
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Configure cache access
        env:
          CACHE_HOST: ${{ secrets.CACHE_HOST }}
          CACHE_PUBLIC_KEY: ${{ secrets.CACHE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          {
            echo "NIX_CONFIG<<NIXCONF_EOF"
            echo "experimental-features = nix-command flakes"
            echo "extra-substituters = https://$CACHE_HOST"
            echo "extra-trusted-public-keys = $CACHE_PUBLIC_KEY"
            echo "NIXCONF_EOF"
          } >> "$GITHUB_ENV"

      - name: Run update script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: custom/pkgs/update.sh ${{ matrix.package }} | tee /tmp/update.log

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG signing key
        if: steps.diff.outputs.changed == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.FORGE_ACTIONS_GPG_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          key_id=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
          git config --global user.signingkey "$key_id"
          git config --global commit.gpgsign true

      - name: Commit, push, and open/update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          title=$(tail -1 /tmp/update.log)
          body=$(cat /tmp/update.log)
          branch="pkg-update/${{ matrix.package }}"
          base="${{ github.ref_name }}"

          git config user.name "${{ vars.GIT_AUTHOR_NAME }}"
          git config user.email "${{ vars.GIT_AUTHOR_EMAIL }}"
          git checkout -B "$branch"
          git commit -am "$title"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch"
            if git diff --quiet "origin/$branch" -- "custom/pkgs/${{ matrix.package }}"; then
              echo "No changes since last push to $branch; skipping."
              exit 0
            fi
          fi

          git push -f origin "$branch"

          api="${{ github.api_url }}/repos/${{ github.repository }}"
          existing=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "$api/pulls?state=open&type=all" \
            | jq --arg h "$branch" '[.[] | select(.head.ref == $h)]')
          pr_id=$(printf '%s' "$existing" | jq -r 'first(.[].number) // empty')

          payload=$(jq -n --arg t "$title" --arg b "$body" '{title: $t, body: $b}')

          if [[ -n "$pr_id" ]]; then
            curl -sf -X PATCH -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
              "$api/pulls/$pr_id" -d "$payload"
          else
            create_payload=$(jq -n --arg t "$title" --arg b "$body" --arg h "$branch" --arg base "$base" \
              '{title: $t, body: $b, head: $h, base: $base}')
            curl -sf -X POST -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
              "$api/pulls" -d "$create_payload"
          fi
